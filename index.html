<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 奇幻島：魔法學院 (素養進階版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --pastel-blue: #D6EAF8;
            --pastel-yellow: #FEF9E7;
            --pastel-purple: #F5EEF8;
            --pastel-pink: #FDEDEC;
            --pastel-green: #E9F7EF;
            --primary-text: #2C3E50;
            --action-color: #8E44AD;
        }

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: var(--pastel-blue);
            color: var(--primary-text);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #fff 2px, transparent 2px);
            background-size: 40px 40px;
        }

        /* Animations */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes slideIn { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px) rotate(-5deg); } 75% { transform: translateX(5px) rotate(5deg); } }
        
        .animate-float { animation: float 3s ease-in-out infinite; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .animate-slide-in { animation: slideIn 0.5s ease-out forwards; }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        /* UI Elements */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 4px solid white;
            box-shadow: 0 10px 25px rgba(142, 68, 173, 0.1);
        }

        .btn-macaron {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            border: none;
            color: white;
            font-weight: 800;
            border-radius: 50px;
            padding: 12px 28px;
            box-shadow: 0 6px 0 #FF758C, 0 10px 15px rgba(255, 117, 140, 0.3);
            transition: all 0.1s ease;
            cursor: pointer;
            display: inline-flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-macaron:active { transform: translateY(6px); box-shadow: 0 0 0 #FF758C, 0 4px 6px rgba(255, 117, 140, 0.3); }
        .btn-macaron.blue { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); box-shadow: 0 6px 0 #89b4fa, 0 10px 15px rgba(137, 180, 250, 0.3); }
        .btn-macaron.blue:active { box-shadow: 0 0 0 #89b4fa; transform: translateY(6px); }
        .btn-macaron.yellow { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); box-shadow: 0 6px 0 #f5b041, 0 10px 15px rgba(245, 176, 65, 0.3); }
        .btn-macaron.yellow:active { box-shadow: 0 0 0 #f5b041; transform: translateY(6px); }
        .btn-macaron.green { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); box-shadow: 0 6px 0 #2ecc71, 0 10px 15px rgba(46, 204, 113, 0.3); }
        .btn-macaron.green:active { box-shadow: 0 0 0 #2ecc71; transform: translateY(6px); }
        .btn-macaron:disabled { filter: grayscale(1); cursor: not-allowed; transform: translateY(6px); box-shadow: none; }

        /* Custom Input/Textarea */
        .effort-input {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: 3px solid #E0E0E0;
            font-size: 1rem;
            font-weight: bold;
            color: #4A235A;
            transition: all 0.3s;
            background: #FAFAFA;
            resize: vertical;
        }
        .effort-input:focus { border-color: #8E44AD; background: white; outline: none; box-shadow: 0 0 0 4px rgba(142, 68, 173, 0.1); }

        /* AI Companion */
        #ai-companion {
            position: fixed; bottom: 20px; right: 20px; z-index: 50;
            display: flex; flex-direction: column; align-items: flex-end; transition: all 0.3s ease;
        }
        #chat-bubble {
            background: white; padding: 12px 20px; border-radius: 20px 20px 0 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 10px;
            max-width: 280px; font-weight: 700; color: #8E44AD;
            border: 3px solid #F5EEF8; opacity: 0; transform: translateY(10px);
            transition: all 0.3s ease; pointer-events: none; line-height: 1.5;
        }
        #chat-bubble.show { opacity: 1; transform: translateY(0); }
        .robot-body {
            width: 80px; height: 80px; background: white; border-radius: 40px;
            display: flex; justify-content: center; align-items: center;
            font-size: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid var(--pastel-blue); cursor: pointer;
        }

        /* Progress Bar */
        .progress-container { width: 100%; height: 20px; background: rgba(255,255,255,0.6); border-radius: 10px; overflow: hidden; border: 2px solid white; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #a1c4fd, #fdcbf1, #f6d365); width: 0%; transition: width 0.5s ease-out; }

        /* Drag and Drop/Click Select Styles */
        .item-chip {
            background: white; border: 3px solid #E0E0E0; border-radius: 15px;
            padding: 8px 12px; margin: 4px; display: inline-flex; align-items: center;
            cursor: pointer; font-weight: bold; transition: all 0.2s; user-select: none; font-size: 0.95rem;
        }
        .item-chip:hover { transform: scale(1.05); border-color: #a1c4fd; }
        .item-chip.selected { background: #fff59d; border-color: #fbc02d; transform: scale(1.1); box-shadow: 0 4px 10px rgba(251, 192, 45, 0.3); z-index: 10;}
        
        .drop-zone {
            min-height: 100px; border: 4px dashed #BDBDBD; border-radius: 20px;
            background: rgba(255,255,255,0.5); display: flex; flex-wrap: wrap; align-content: flex-start;
            padding: 10px; gap: 8px; transition: all 0.3s;
        }
        .drop-zone.active { border-color: #8E44AD; background: var(--pastel-purple); }

        /* Badges */
        .badge {
            width: 45px; height: 45px; border-radius: 50%; background: #eee;
            display: flex; justify-content: center; align-items: center; font-size: 22px;
            filter: grayscale(100%); transition: all 0.5s; box-shadow: inset 0 4px 6px rgba(0,0,0,0.1);
        }
        .badge.unlocked {
            filter: grayscale(0%); background: linear-gradient(135deg, #f6d365, #fda085);
            box-shadow: 0 3px 10px rgba(245, 176, 65, 0.4); transform: scale(1.1) rotate(5deg);
        }

        /* Debate Buttons */
        .debate-btn {
            flex: 1; padding: 20px; border-radius: 20px; border: 4px solid transparent;
            font-size: 1.5rem; font-weight: 900; cursor: pointer; transition: all 0.3s;
            display: flex; flex-direction: column; items-center; gap: 10px;
        }
        .debate-btn.unselected { background: #f3f4f6; color: #9ca3af; border-color: #e5e7eb; }
        .debate-btn.selected-yes { background: #d1fae5; color: #059669; border-color: #10b981; transform: scale(1.05); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
        .debate-btn.selected-no { background: #fee2e2; color: #dc2626; border-color: #ef4444; transform: scale(1.05); box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2); }

        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative pb-32">

    <!-- Top Navigation -->
    <header class="w-full max-w-5xl mx-auto p-4 flex flex-col gap-2 z-10 hidden" id="main-nav">
        <div class="flex flex-col md:flex-row justify-between items-center glass-card px-6 py-3 gap-4">
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-2xl shadow-inner border-2 border-purple-300">
                    <i class="fa-solid fa-user-astronaut text-purple-500"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg text-purple-800" id="display-name">玩家</h2>
                    <p class="text-xs text-gray-500 font-bold">積分: <span id="display-score" class="text-pink-500 text-lg">0</span></p>
                </div>
            </div>
            
            <div class="flex gap-2 flex-wrap justify-center">
                <div class="badge" id="badge-1" title="生活探索者">🔍</div>
                <div class="badge" id="badge-2" title="超能解鎖大師">⚡</div>
                <div class="badge" id="badge-3" title="咒語詠唱者">🧙‍♂️</div>
                <div class="badge" id="badge-4" title="AI大法官">⚖️</div>
                <div class="badge" id="badge-5" title="人生航海家">🧭</div>
                <div class="badge" id="badge-6" title="自主學習王">🚀</div>
            </div>
        </div>
        <div class="progress-container shadow-sm">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow flex items-start justify-center p-4 w-full max-w-5xl mx-auto mt-4" id="app-container">
        <!-- Content injected here via JS -->
    </main>

    <!-- AI Companion -->
    <div id="ai-companion" class="hidden">
        <div id="chat-bubble">我來幫你囉！</div>
        <div class="robot-body animate-float" onclick="companionPoke()">🤖</div>
    </div>

    <!-- Application Logic -->
    <script>
        // --- 1. Audio Engine ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio(); if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc.start(); osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'pop') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'magic') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.2);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // --- 2. State Management ---
        const TOTAL_MODULES = 6;
        let state = {
            playerName: '', score: 0, currentModule: 0,
            badges: [false, false, false, false, false, false],
            selectedItem: null,
            reflections: {
                m1: '', m2: '', m3: '', m4_choice: '', m4_reason: '', m5: '', m6_t1: '', m6_t2: ''
            }
        };

        function saveState() { localStorage.setItem('aiAcademyState_v2', JSON.stringify(state)); }
        function loadState() {
            const saved = localStorage.getItem('aiAcademyState_v2');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // Minimal restore: just name and maybe jump to start. For this demo, we restart but keep name.
                    if(parsed.playerName) state.playerName = parsed.playerName;
                } catch(e) {}
            }
        }

        // --- 3. Companion Logic ---
        let speakTimeout;
        function speak(text, duration = 4000) {
            clearTimeout(speakTimeout);
            const bubble = document.getElementById('chat-bubble');
            bubble.innerHTML = text;
            bubble.classList.add('show');
            playSound('pop');
            speakTimeout = setTimeout(() => { bubble.classList.remove('show'); }, duration);
        }
        
        function companionPoke() {
            const msgs = ["加油！思考比答案更重要喔！", "深呼吸，慢慢寫沒關係！", "你覺得 AI 是朋友還是工具呢？", "哇！你學得好快！"];
            speak(msgs[Math.floor(Math.random() * msgs.length)]);
            document.querySelector('.robot-body').classList.add('animate-shake');
            setTimeout(() => document.querySelector('.robot-body').classList.remove('animate-shake'), 400);
        }

        // --- 4. Render Engine ---
        const appContainer = document.getElementById('app-container');

        function updateUI() {
            if (state.currentModule > 0 && state.currentModule <= TOTAL_MODULES) {
                document.getElementById('main-nav').classList.remove('hidden');
                document.getElementById('ai-companion').classList.remove('hidden');
                document.getElementById('display-name').innerText = state.playerName;
                document.getElementById('display-score').innerText = state.score;
                document.getElementById('progress-bar').style.width = `${((state.currentModule - 1) / TOTAL_MODULES) * 100}%`;
                
                state.badges.forEach((unlocked, idx) => {
                    const b = document.getElementById(`badge-${idx+1}`);
                    if(b) { unlocked ? b.classList.add('unlocked') : b.classList.remove('unlocked'); }
                });
            } else {
                document.getElementById('main-nav').classList.add('hidden');
            }

            appContainer.innerHTML = '';
            const screen = document.createElement('div');
            screen.className = 'w-full animate-pop';
            
            let htmlContent = '';
            switch(state.currentModule) {
                case 0: htmlContent = renderLogin(); break;
                case 1: htmlContent = renderModule1(); break;
                case 2: htmlContent = renderModule2(); break;
                case 3: htmlContent = renderModule3(); break;
                case 4: htmlContent = renderModule4(); break;
                case 5: htmlContent = renderModule5(); break;
                case 6: htmlContent = renderModule6(); break;
                case 7: htmlContent = renderEnd(); break;
            }
            screen.innerHTML = htmlContent;
            appContainer.appendChild(screen);

            switch(state.currentModule) {
                case 0: initLogin(); break;
                case 1: initModule1(); break;
                case 2: /* handled in render */ break;
                case 3: initModule3(); break;
                case 4: /* handled in render */ break;
                case 5: initModule5(); break;
                case 6: /* handled in render */ break;
                case 7: initEnd(); break;
            }
        }

        function showFeedback(isCorrect, message, nextAction) {
            if (isCorrect) playSound('success'); else playSound('error');
            
            const modal = document.createElement('div');
            modal.className = `fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 animate-pop backdrop-blur-sm`;
            modal.innerHTML = `
                <div class="glass-card p-8 text-center max-w-sm mx-4 border-t-8 ${isCorrect ? 'border-t-green-400' : 'border-t-red-400'}">
                    <div class="text-6xl mb-4">${isCorrect ? '🎉' : '🤔'}</div>
                    <h2 class="text-2xl font-bold mb-2 ${isCorrect ? 'text-green-600' : 'text-red-500'}">${isCorrect ? '太棒了！' : '再想想看喔！'}</h2>
                    <p class="text-gray-700 mb-6 font-bold leading-relaxed">${message}</p>
                    <button class="btn-macaron ${isCorrect ? 'blue' : 'yellow'} w-full" id="feedback-btn">
                        ${isCorrect ? '繼續 🚀' : '重新試試 ↺'}
                    </button>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('feedback-btn').onclick = () => {
                modal.remove();
                if (isCorrect && nextAction) nextAction();
            };
        }

        // ==========================================
        // MODULE 0: Login
        // ==========================================
        function renderLogin() {
            return `
                <div class="glass-card p-8 md:p-12 text-center max-w-md mx-auto relative overflow-hidden mt-10">
                    <div class="absolute -top-10 -left-10 text-8xl opacity-20">🤖</div>
                    <div class="absolute -bottom-10 -right-10 text-8xl opacity-20">✨</div>
                    <h1 class="text-4xl md:text-5xl font-black text-purple-600 mb-2 tracking-wider">AI 奇幻島</h1>
                    <h2 class="text-xl font-bold text-gray-600 mb-2">國中生的 AI 魔法學院</h2>
                    <div class="inline-block bg-yellow-100 text-yellow-800 text-sm font-bold px-3 py-1 rounded-full mb-8">✨ 思辨升級版 ✨</div>
                    
                    <div class="bg-white p-6 rounded-2xl shadow-inner mb-6">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Felix&backgroundColor=E0F7FA" alt="Robot" class="w-32 h-32 mx-auto mb-4 bg-blue-100 rounded-full border-4 border-white shadow-md animate-float">
                        <input type="text" id="player-name" placeholder="請輸入你的魔法代號 (姓名)" class="w-full p-4 rounded-xl border-2 border-purple-200 focus:border-purple-500 focus:outline-none text-center font-bold text-lg mb-2">
                    </div>
                    
                    <button id="start-btn" class="btn-macaron text-xl w-full py-4 shadow-xl">開始奇幻旅程 🚀</button>
                </div>
            `;
        }

        function initLogin() {
            loadState();
            if (state.playerName) document.getElementById('player-name').value = state.playerName;

            document.getElementById('start-btn').onclick = () => {
                initAudio();
                const name = document.getElementById('player-name').value.trim();
                if (!name) { speak("請告訴我你的名字喔！"); return; }
                state.playerName = name;
                state.currentModule = 1;
                state.score = 0;
                saveState();
                updateUI();
                speak(`歡迎來到魔法學院，${name}！我們開始吧！`);
            };
        }

        // ==========================================
        // MODULE 1: AI in Life (Classification + Effort)
        // ==========================================
        const m1Data = [
            { id: 'i1', name: '掃地機器人', type: 'ai', icon: '🧹' },
            { id: 'i2', name: 'YouTube 推薦影片', type: 'ai', icon: '📱' },
            { id: 'i3', name: '傳統腳踏車', type: 'none', icon: '🚲' },
            { id: 'i6', name: 'IG推薦貼文', type: 'ai', icon: '📸' },
            { id: 'i7', name: 'Google地圖導航', type: 'ai', icon: '🗺️' },
            { id: 'i4', name: '木頭鉛筆', type: 'none', icon: '✏️' },
            { id: 'i8', name: '自動販賣機', type: 'none', icon: '🥤' },
            { id: 'i5', name: '手機臉部解鎖', type: 'ai', icon: '😁' },
            { id: 'i9', name: '智慧音箱(Siri)', type: 'ai', icon: '🔊' },
            { id: 'i10', name: '紙本課本', type: 'none', icon: '📖' }
        ];
        let m1Correct = 0;

        function renderModule1() {
            speak("四周有很多物品，哪些藏有 AI 魔法呢？點擊物品，再點分類箱！");
            return `
                <div class="glass-card p-6 w-full flex flex-col">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="text-3xl bg-blue-100 p-3 rounded-xl">🏝️</div>
                        <div>
                            <h2 class="text-2xl font-bold text-blue-800">第一關：生活探索者</h2>
                            <p class="text-gray-600 font-bold">點擊下方的物品，然後把它放入正確的分類箱！</p>
                        </div>
                    </div>

                    <div id="m1-task-area">
                        <div class="bg-blue-50 p-4 rounded-xl mb-4 flex flex-wrap gap-2 justify-center" id="m1-items"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-green-50 rounded-2xl p-4 border-4 border-green-200 flex flex-col">
                                <h3 class="text-center font-black text-green-700 text-lg mb-2">🤖 包含 AI 魔法</h3>
                                <div class="drop-zone flex-grow" id="zone-ai" onclick="placeItem('ai')"></div>
                            </div>
                            <div class="bg-gray-50 rounded-2xl p-4 border-4 border-gray-200 flex flex-col">
                                <h3 class="text-center font-black text-gray-600 text-lg mb-2">📦 一般物品 (無AI)</h3>
                                <div class="drop-zone flex-grow" id="zone-none" onclick="placeItem('none')"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Effort Section (Hidden initially) -->
                    <div id="m1-effort" class="hidden animate-slide-in mt-6 bg-gradient-to-r from-blue-50 to-indigo-50 p-6 rounded-2xl border-4 border-indigo-200">
                        <h3 class="text-xl font-bold text-indigo-800 mb-2"><i class="fa-solid fa-lightbulb text-yellow-500 mr-2"></i> 魔法思考時間</h3>
                        <p class="text-gray-700 font-bold mb-4 text-lg">你有沒有發現？像 IG貼文、YouTube、地圖導航，AI 都在『觀察你的習慣』來推薦內容。<br><span class="text-indigo-600">你覺得這樣好還是不好？為什麼？</span></p>
                        <textarea id="m1-input" class="effort-input mb-4" placeholder="例如：我覺得很好，因為... / 我覺得不好，因為..."></textarea>
                        <button class="btn-macaron blue w-full text-lg" onclick="submitM1Effort()">記錄想法並前進 🚀</button>
                    </div>
                </div>
            `;
        }

        function initModule1() {
            const container = document.getElementById('m1-items');
            m1Correct = 0; state.selectedItem = null;
            // Shuffle items
            const shuffled = [...m1Data].sort(() => 0.5 - Math.random());
            shuffled.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-chip'; div.id = item.id;

            const c = m4Cases[m4Current];
            return `
                <div class="bg-gray-50 border-4 border-gray-200 rounded-2xl p-6 md:p-8 mb-8 relative animate-pop min-h-[150px] flex items-center justify-center">
                    <div class="absolute -top-5 left-1/2 transform -translate-x-1/2 bg-red-500 text-white font-black px-4 py-1 rounded-full shadow-md">
                        案卷 ${m4Current + 1}
                    </div>
                    <p class="text-xl font-bold text-gray-800 leading-relaxed">${c.q}</p>
                </div>
                <div class="flex justify-center gap-4 md:gap-8">
                    <button class="btn-macaron bg-gradient-to-r from-green-400 to-green-500 shadow-green-200 text-xl px-8 py-4 flex flex-col items-center gap-1 hover:scale-105" onclick="checkM4(true)">
                        <span>⭕</span><span class="text-sm">這樣 OK</span>
                    </button>
                    <button class="btn-macaron bg-gradient-to-r from-red-400 to-red-500 shadow-red-200 text-xl px-8 py-4 flex flex-col items-center gap-1 hover:scale-105" onclick="checkM4(false)">
                        <span>❌</span><span class="text-sm">這不行</span>
                    </button>
                </div>
            `;
        }

        function checkM4(userAns) {
            const c = m4Cases[m4Current];
            if (userAns === c.ans) {
                state.score += 10;
                showFeedback(true, c.exp, () => {
                    m4Current++; document.getElementById('m4-content').innerHTML = getM4HTML();
                });
            } else { showFeedback(false, c.exp); }
        }

        let currentDebateChoice = '';
        function selectDebate(choice) {
            playSound('pop');
            currentDebateChoice = choice;
            const btnYes = document.getElementById('btn-debate-yes');
            const btnNo = document.getElementById('btn-debate-no');
            
            btnYes.className = 'debate-btn ' + (choice === '應該' ? 'selected-yes' : 'unselected opacity-50');
            btnNo.className = 'debate-btn ' + (choice === '不應該' ? 'selected-no' : 'unselected opacity-50');
            
            document.getElementById('debate-reason-area').classList.remove('hidden');
            speak(choice === '應該' ? "你選擇了『應該』，請告訴我為什麼？" : "你選擇了『不應該』，請告訴我為什麼？");
        }

        function submitM4Debate() {
            const val = document.getElementById('m4-input').value.trim();
            if(val.length < 5) { speak("法官大人，判決理由太短了，請多寫一點！"); return; }
            
            state.reflections.m4_choice = currentDebateChoice;
            state.reflections.m4_reason = val;
            state.score += 20; saveState();
            state.badges[3] = true;
            
            playSound('success');
            speak("鏗！判決確定！這個世界上沒有絕對的對錯，你的思考很有價值！", 4000);
            setTimeout(() => { state.currentModule = 5; updateUI(); }, 3500);
        }

        // ==========================================
        // MODULE 5: Life Choices (Categorization + Reflection)
        // ==========================================
        const m5Data = [
            { id: 't1', name: '檢查英文拼字錯誤', type: 'ai-do' },
            { id: 't2', name: '寫日記抒發心情', type: 'me-do' },
            { id: 't4', name: '萬字長文整理重點', type: 'ai-do' },
            { id: 't5', name: '和朋友吵架後的道歉', type: 'me-do' },
            { id: 't6', name: '幫我整理考試重點', type: 'ai-do' },
            { id: 't7', name: '決定要不要跟朋友和好', type: 'me-do' },
            { id: 't8', name: '幫我翻譯英文句子', type: 'ai-do' },
            { id: 't9', name: '選擇未來人生方向', type: 'me-do' }
        ];
        let m5Correct = 0; let m5Selected = null;

        function renderModule5() {
            speak("第五關：有些事能交給 AI，有些事一定要自己來！請分類！");
            return `
                <div class="glass-card p-6 w-full flex flex-col">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="text-3xl bg-indigo-100 p-3 rounded-xl">⛰️</div>
                        <div>
                            <h2 class="text-2xl font-bold text-indigo-800">第五關：決策山巔</h2>
                            <p class="text-gray-600 font-bold text-sm">把任務分派給「AI 助理」或「自己」</p>
                        </div>
                    </div>

                    <div id="m5-task-area">
                        <div class="bg-indigo-50 p-4 rounded-xl mb-4 flex flex-wrap gap-2 justify-center" id="m5-items"></div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="bg-blue-50 rounded-2xl p-4 border-4 border-blue-200 flex flex-col">
                                <h3 class="text-center font-black text-blue-700 mb-2">🤖 AI 幫忙做 (省時/整理)</h3>
                                <div class="drop-zone flex-grow" id="zone-ai-do" onclick="placeM5Item('ai-do')"></div>
                            </div>
                            <div class="bg-orange-50 rounded-2xl p-4 border-4 border-orange-200 flex flex-col">
                                <h3 class="text-center font-black text-orange-700 mb-2">🙋‍♂️ 我自己做 (情感/決策)</h3>
                                <div class="drop-zone flex-grow" id="zone-me-do" onclick="placeM5Item('me-do')"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Effort Section -->
                    <div id="m5-effort" class="hidden animate-slide-in mt-6 bg-gradient-to-r from-orange-50 to-red-50 p-6 rounded-2xl border-4 border-orange-200">
                        <h3 class="text-xl font-bold text-orange-800 mb-2">🧭 航海家反思</h3>
                        <p class="text-gray-700 font-bold mb-4 text-lg">你看，人生中有很多重要的決定和情感連結是 AI 無法取代的。<br><span class="text-orange-600">你覺得如果人類「太依賴 AI」，會發生什麼事？</span></p>
                        <textarea id="m5-input" class="effort-input mb-4" placeholder="例如：我覺得人類可能會失去思考能力..."></textarea>
                        <button class="btn-macaron yellow w-full text-lg" onclick="submitM5Effort()">前進最終挑戰 🚀</button>
                    </div>
                </div>
            `;
        }

        function initModule5() {
            const container = document.getElementById('m5-items');
            m5Correct = 0; m5Selected = null;
            const shuffled = [...m5Data].sort(() => 0.5 - Math.random());
            shuffled.forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-chip bg-white'; div.id = item.id; div.innerText = item.name;
                div.onclick = () => {
                    playSound('pop');
                    document.querySelectorAll('#m5-items .item-chip').forEach(e => e.classList.remove('selected'));
                    div.classList.add('selected'); m5Selected = item.id;
                    document.querySelectorAll('.drop-zone').forEach(z => z.classList.add('active'));
                };
                container.appendChild(div);
            });
        }

        function placeM5Item(targetZone) {
            if (!m5Selected) return;
            const itemObj = m5Data.find(i => i.id === m5Selected);
            
            if (itemObj.type === targetZone) {
                const el = document.getElementById(m5Selected);
                el.classList.remove('selected'); el.onclick = null; el.style.cursor = 'default';
                document.getElementById(`zone-${targetZone}`).appendChild(el);
                
                playSound('success'); m5Correct++;
                let msg = targetZone === 'ai-do' ? "對！繁瑣處理交給 AI！" : "沒錯！牽涉情感與決策要自己來！";
                speak(msg, 2000);
                m5Selected = null; document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));

                if (m5Correct === m5Data.length) {
                    state.score += 20;
                    speak("你完全掌握了與 AI 共存的智慧！來做個總結吧！", 4000);
                    document.getElementById('m5-task-area').classList.add('opacity-50', 'pointer-events-none');
                    document.getElementById('m5-effort').classList.remove('hidden');
                }
            } else {
                showFeedback(false, "再想一下喔！這件事交給誰處理比較好？");
                document.getElementById(m5Selected).classList.remove('selected'); m5Selected = null;
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('active'));
            }
        }

        function submitM5Effort() {
            const val = document.getElementById('m5-input').value.trim();
            if(val.length < 2) { speak("請寫下你的想法喔！"); return; }
            state.reflections.m5 = val;
            state.score += 15; saveState();
            state.badges[4] = true; state.currentModule = 6; updateUI();
        }

        // ==========================================
        // MODULE 6: Self-Learning Challenge (NEW)
        // ==========================================
        function renderModule6() {
            speak("最後一關：自主學習挑戰！證明你已經是可以駕馭 AI 的大師了！");
            return `
                <div class="glass-card p-6 md:p-8 w-full animate-pop">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="text-3xl bg-teal-100 p-3 rounded-xl">🚀</div>
                        <div>
                            <h2 class="text-2xl font-bold text-teal-800">第六關：自主學習挑戰</h2>
                            <p class="text-gray-600 font-bold">把學習帶入生活，完成這兩項任務！</p>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-white p-6 rounded-2xl border-4 border-teal-100 shadow-sm">
                            <h3 class="font-black text-teal-700 text-lg mb-2"><i class="fa-solid fa-gamepad mr-2"></i> 任務 1：行動派</h3>
                            <p class="text-gray-700 font-bold mb-3">請寫下你<span class="text-teal-600">「今天或是最近一次」用 AI 做了什麼？</span>它幫了你什麼忙？</p>
                            <textarea id="m6-t1" class="effort-input bg-teal-50" placeholder="例如：我昨天用 ChatGPT 幫我檢查英文句子的文法，讓我知道哪裡拼錯了..."></textarea>
                        </div>

                        <div class="bg-white p-6 rounded-2xl border-4 border-cyan-100 shadow-sm">
                            <h3 class="font-black text-cyan-700 text-lg mb-2"><i class="fa-solid fa-scale-balanced mr-2"></i> 任務 2：AI vs 我 (超關鍵🔥)</h3>
                            <p class="text-gray-700 font-bold mb-3">仔細比較一下，列出 <br>1. <span class="text-red-500">一件 AI 做得比你好</span>的事。<br>2. <span class="text-blue-600">一件你比 AI 強</span>的事。</p>
                            <textarea id="m6-t2" class="effort-input bg-cyan-50 h-32" placeholder="1. AI 比我強的是：找資料的速度\n2. 我比 AI 強的是：知道朋友為什麼難過"></textarea>
                        </div>
                        
                        <button class="btn-macaron green w-full text-xl py-4 shadow-lg hover:scale-[1.02]" onclick="submitM6()">領取專屬結業證書 🎓</button>
                    </div>
                </div>
            `;
        }

        function submitM6() {
            const t1 = document.getElementById('m6-t1').value.trim();
            const t2 = document.getElementById('m6-t2').value.trim();
            if(t1.length < 5 || t2.length < 5) { speak("這兩個任務很重要，請認真寫下你的觀察喔！"); return; }
            
            state.reflections.m6_t1 = t1;
            state.reflections.m6_t2 = t2;
            state.score += 30; saveState();
            state.badges[5] = true;
            state.currentModule = 7; updateUI();
        }

        // ==========================================
        // MODULE 7: End Screen (Certificate + Record)
        // ==========================================
        function renderEnd() {
            return `
                <div class="w-full max-w-3xl mx-auto space-y-6 pb-10">
                    <!-- Certificate -->
                    <div class="glass-card p-10 text-center animate-pop relative overflow-hidden shadow-2xl">
                        <div class="absolute top-0 left-0 w-full h-4 bg-gradient-to-r from-pink-400 via-purple-400 to-blue-400"></div>
                        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-pink-500 mb-2 mt-4">
                            結業證書
                        </h1>
                        <h2 class="text-xl font-bold text-gray-600 mb-8">AI 奇幻島 魔法學院</h2>
                        
                        <div class="bg-yellow-50 rounded-2xl p-6 border-4 border-yellow-200 mb-8 relative">
                            <div class="text-6xl mb-4 animate-float">🎓</div>
                            <p class="text-lg font-bold text-gray-700 mb-2">茲證明</p>
                            <h3 class="text-3xl font-black text-blue-700 mb-4 border-b-2 border-blue-200 pb-2 inline-block px-8">${state.playerName}</h3>
                            <p class="text-gray-700 font-bold mb-4">
                                已成功通過六大試煉，掌握 AI 應用、思辨能力，並完成自主學習挑戰，具備優良的 AI 數位素養！
                            </p>
                            <div class="text-2xl text-pink-500 font-black">
                                最終總積分: ${state.score} 
                            </div>
                        </div>

                        <div class="flex justify-center gap-2 flex-wrap mb-6">
                            <div class="badge unlocked" title="生活探索者">🔍</div>
                            <div class="badge unlocked" title="超能解鎖大師">⚡</div>
                            <div class="badge unlocked" title="咒語詠唱者">🧙‍♂️</div>
                            <div class="badge unlocked" title="AI大法官">⚖️</div>
                            <div class="badge unlocked" title="人生航海家">🧭</div>
                            <div class="badge unlocked" title="自主學習王">🚀</div>
                        </div>
                    </div>

                    <!-- Learning Record -->
                    <div class="glass-card p-8 animate-slide-in shadow-xl" style="animation-delay: 0.5s; animation-fill-mode: both;">
                        <h2 class="text-2xl font-black text-purple-800 mb-6 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-book-open text-purple-500"></i> 我的 AI 學習歷程檔案
                        </h2>
                        
                        <div class="space-y-4 text-left">
                            ${renderRecordItem('🔍 發現', 'AI 觀察習慣好不好？', state.reflections.m1)}
                            ${renderRecordItem('⚡ 想像', '沒有 AI 的作業會怎樣？', state.reflections.m2)}
                            ${renderRecordItem('🧙‍♂️ 創造', '我的夢想 AI 世界', state.reflections.m3)}
                            ${renderRecordItem('⚖️ 辯論', `AI 應不應該幫忙寫作業？ (選擇：${state.reflections.m4_choice})`, state.reflections.m4_reason)}
                            ${renderRecordItem('🧭 反思', '太依賴 AI 會發生什麼事？', state.reflections.m5)}
                            ${renderRecordItem('🚀 行動', '我最近用 AI 做了什麼', state.reflections.m6_t1)}
                            ${renderRecordItem('🏆 比較', 'AI vs 我', state.reflections.m6_t2)}
                        </div>

                        <div class="mt-8 text-center">
                            <button class="btn-macaron text-lg px-8" onclick="location.reload()">再玩一次 / 重新開始 ↺</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderRecordItem(icon, title, content) {
            if (!content) return '';
            return `
                <div class="bg-white p-4 rounded-xl border-l-4 border-purple-400 shadow-sm">
                    <h4 class="font-bold text-gray-500 text-sm mb-1">${icon} ${title}</h4>
                    <p class="font-bold text-gray-800">${content.replace(/\n/g, '<br>')}</p>
                </div>
            `;
        }

        function initEnd() {
            playSound('success'); setTimeout(() => playSound('magic'), 300);
            document.getElementById('ai-companion').classList.add('hidden');
            document.getElementById('main-nav').classList.add('hidden');
            fireConfetti();
        }

        // --- Utility: Confetti ---
        function fireConfetti() {
            const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#8fd3f4'];
            for(let i=0; i<120; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed'; conf.style.width = '12px'; conf.style.height = '12px';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.top = '-10px'; conf.style.left = Math.random() * 100 + 'vw';
                conf.style.opacity = Math.random() + 0.5; conf.style.transform = `rotate(${Math.random() * 360}deg)`;
                conf.style.zIndex = '100'; document.body.appendChild(conf);

                const duration = Math.random() * 3 + 2;
                conf.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*300 - 150}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], { duration: duration * 1000, easing: 'cubic-bezier(.37,0,.63,1)', fill: 'forwards' });
                setTimeout(() => conf.remove(), duration * 1000);
            }
        }

        // --- Init ---
        window.onload = () => { updateUI(); };

    </script>
</body>
</html>
